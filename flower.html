<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Untuk AQILA🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       RESET
    ============================================================ */
    *, *::after, *::before {
      padding: 0; margin: 0; box-sizing: border-box;
    }

    /* ============================================================
       ROOT VARIABLES
    ============================================================ */
    :root {
      --dark-color: #0a0010;
      --rose:       #e0579a;
      --rose-deep:  #c0395a;
      --lavender:   #c9a7eb;
      --gold:       #f9d976;
      --teal:       #39c6d6;
      --teal-deep:  #14757a;
      --green:      #159faa;
      --green-dark: #079097;
    }

    /* ============================================================
       BODY
    ============================================================ */
    body {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--dark-color);
      overflow: hidden;
      perspective: 1000px;
      font-family: 'Poppins', sans-serif;
      cursor: crosshair;
    }

    /* ============================================================
       NIGHT BACKGROUND
    ============================================================ */
    .night {
      position: fixed;
      left: 50%; top: 0;
      transform: translateX(-50%);
      width: 100%; height: 100%;
      filter: blur(0.1vmin);
      background-image:
        radial-gradient(ellipse at top, transparent 0%, var(--dark-color)),
        radial-gradient(ellipse at bottom, var(--dark-color), rgba(145,233,255,0.2)),
        repeating-linear-gradient(220deg, rgb(0,0,0) 0px, rgb(0,0,0) 19px, transparent 19px, transparent 22px),
        repeating-linear-gradient(189deg, rgb(0,0,0) 0px, rgb(0,0,0) 19px, transparent 19px, transparent 22px),
        repeating-linear-gradient(148deg, rgb(0,0,0) 0px, rgb(0,0,0) 19px, transparent 19px, transparent 22px),
        linear-gradient(90deg, rgb(0,255,250), rgb(240,240,240));
    }

    /* ============================================================
       PARTICLE CANVAS (click-burst & floating hearts)
    ============================================================ */
    #particleCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* ============================================================
       GLASSMORPHISM PANEL
    ============================================================ */
    #glassPanel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 500;
      width: min(480px, 90vw);
      padding: 2.8rem 2.4rem 2.4rem;
      background: rgba(10, 0, 20, 0.45);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border-radius: 2.2rem;
      border: 1.5px solid rgba(201, 167, 235, 0.35);
      box-shadow:
        0 0 60px rgba(192, 57, 90, 0.18),
        0 0 120px rgba(57, 198, 214, 0.08),
        0 2px 0 rgba(255,255,255,0.08) inset;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      animation: panelFloat 6s ease-in-out infinite;
      transition: opacity 0.8s ease;
    }

    /* subtle float */
    @keyframes panelFloat {
      0%, 100% { transform: translate(-50%, -50%);        }
      50%       { transform: translate(-50%, calc(-50% - 8px)); }
    }

    /* Panel decorative top-line shimmer */
    #glassPanel::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, rgba(201,167,235,0.8), rgba(57,198,214,0.6), transparent);
      border-radius: 999px;
    }

    /* ---- Panel title ---- */
    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-style: italic;
      color: #fff;
      letter-spacing: 0.02em;
      line-height: 1.3;
      text-shadow: 0 0 30px rgba(224,87,154,0.6), 0 0 60px rgba(57,198,214,0.3);
      animation: titleGlow 3s ease-in-out infinite;
    }
    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 0 20px rgba(224,87,154,0.5), 0 0 40px rgba(57,198,214,0.2); }
      50%       { text-shadow: 0 0 40px rgba(224,87,154,0.9), 0 0 80px rgba(57,198,214,0.5); }
    }

    /* ---- Divider ---- */
    .panel-divider {
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,167,235,0.5), transparent);
    }

    /* ---- Typing message ---- */
    #typingText {
      font-family: 'Playfair Display', serif;
      font-size: clamp(0.82rem, 2.2vw, 0.98rem);
      font-style: italic;
      color: rgba(255,255,255,0.88);
      line-height: 1.75;
      letter-spacing: 0.015em;
      min-height: 4.5rem;
    }
    #typingCursor {
      display: inline-block;
      width: 2px; height: 1em;
      background: var(--rose);
      margin-left: 2px;
      vertical-align: middle;
      animation: cursorBlink 0.7s step-end infinite;
    }
    @keyframes cursorBlink { 50% { opacity: 0; } }

    /* ---- Hover hint ---- */
    .hover-hint {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(57,198,214,0.7);
      animation: hintPulse 2.5s ease-in-out infinite;
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 0.3; }
    }

    /* ---- Heart counter ---- */
    #heartCounter {
      font-size: 0.78rem;
      color: rgba(224,87,154,0.8);
      letter-spacing: 0.05em;
    }

    /* ---- Close / toggle button ---- */
    #toggleBtn {
      padding: 0.5rem 1.6rem;
      background: linear-gradient(135deg, rgba(224,87,154,0.3), rgba(57,198,214,0.2));
      border: 1px solid rgba(224,87,154,0.4);
      border-radius: 50px;
      color: rgba(255,255,255,0.85);
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    #toggleBtn:hover {
      background: linear-gradient(135deg, rgba(224,87,154,0.6), rgba(57,198,214,0.4));
      transform: scale(1.05);
      box-shadow: 0 4px 20px rgba(224,87,154,0.4);
    }

    /* ---- Panel hidden state ---- */
    #glassPanel.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ============================================================
       FLOWER SCENE — all original CSS inlined
    ============================================================ */
    .container {
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .flowers {
      position: relative;
      transform: scale(0.9);
    }

    /* ---- Flower base ---- */
    .flower {
      position: absolute;
      bottom: 10vmin;
      transform-origin: bottom center;
      z-index: 10;
      --fl-speed: 0.8s;
    }

    .flower--1 { animation: moving-flower-1 4s linear infinite; }
    .flower--1 .flower__line { height: 70vmin; animation-delay: 0.3s; }
    .flower--1 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.6s backwards; }
    .flower--1 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.4s backwards; }
    .flower--1 .flower__line__leaf--3 { animation: blooming-leaf-left  var(--fl-speed) 1.2s backwards; }
    .flower--1 .flower__line__leaf--4 { animation: blooming-leaf-left  var(--fl-speed) 1.0s backwards; }
    .flower--1 .flower__line__leaf--5 { animation: blooming-leaf-right var(--fl-speed) 1.8s backwards; }
    .flower--1 .flower__line__leaf--6 { animation: blooming-leaf-left  var(--fl-speed) 2.0s backwards; }

    .flower--2 {
      left: 50%;
      transform: rotate(20deg);
      animation: moving-flower-2 4s linear infinite;
    }
    .flower--2 .flower__line { height: 60vmin; animation-delay: 0.6s; }
    .flower--2 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.9s backwards; }
    .flower--2 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.7s backwards; }
    .flower--2 .flower__line__leaf--3 { animation: blooming-leaf-left  var(--fl-speed) 1.5s backwards; }
    .flower--2 .flower__line__leaf--4 { animation: blooming-leaf-left  var(--fl-speed) 1.3s backwards; }

    .flower--3 {
      left: 50%;
      transform: rotate(-15deg);
      animation: moving-flower-3 4s linear infinite;
    }
    .flower--3 .flower__line { animation-delay: 0.9s; }
    .flower--3 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 2.5s backwards; }
    .flower--3 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 2.3s backwards; }
    .flower--3 .flower__line__leaf--3 { animation: blooming-leaf-left  var(--fl-speed) 2.1s backwards; }
    .flower--3 .flower__line__leaf--4 { animation: blooming-leaf-left  var(--fl-speed) 1.9s backwards; }

    /* ---- Leafs ---- */
    .flower__leafs {
      position: relative;
      animation: blooming-flower 2s backwards;
    }
    .flower__leafs--1 { animation-delay: 1.1s; }
    .flower__leafs--2 { animation-delay: 1.4s; }
    .flower__leafs--3 { animation-delay: 1.7s; }
    .flower__leafs::after {
      content: '';
      position: absolute;
      left: 0; top: 0;
      transform: translate(-50%,-100%);
      width: 8vmin; height: 8vmin;
      background-color: #6bf0ff;
      filter: blur(10vmin);
    }

    .flower__leaf {
      position: absolute;
      bottom: 0; left: 50%;
      width: 8vmin; height: 11vmin;
      border-radius: 51% 49% 47% 53% / 44% 45% 55% 69%;
      background-color: #a7ffee;
      background-image: linear-gradient(to top, #54b8aa, #a7ffee);
      transform-origin: bottom center;
      opacity: 0.9;
      box-shadow: inset 0 0 2vmin rgba(255,255,255,0.5);
    }
    .flower__leaf--1 { transform: translate(-10%,  1%) rotateY(40deg) rotateX(-50deg); }
    .flower__leaf--2 { transform: translate(-50%, -4%) rotateX(40deg); }
    .flower__leaf--3 { transform: translate(-90%,  0%) rotateY(45deg) rotateX(50deg); }
    .flower__leaf--4 {
      width: 8vmin; height: 8vmin;
      transform-origin: bottom left;
      border-radius: 4vmin 10vmin 4vmin 4vmin;
      transform: translate(0%, 18%) rotateX(70deg) rotate(-43deg);
      background-image: linear-gradient(to top, #39c6d6, #a7ffee);
      z-index: 1; opacity: 0.8;
    }

    /* ---- White circle ---- */
    .flower__white-circle {
      position: absolute;
      left: -3.5vmin; top: -3vmin;
      width: 9vmin; height: 4vmin;
      border-radius: 50%;
      background-color: #fff;
    }
    .flower__white-circle::after {
      content: '';
      position: absolute;
      left: 50%; top: 45%;
      transform: translate(-50%,-50%);
      width: 60%; height: 60%;
      border-radius: inherit;
      background-image:
        repeating-linear-gradient(135deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 12px),
        repeating-linear-gradient(45deg, rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 12px),
        linear-gradient(90deg, rgb(255,235,18), rgb(255,206,0));
    }

    /* ---- Stem line ---- */
    .flower__line {
      height: 55vmin;
      width: 1.5vmin;
      background-image:
        linear-gradient(to left, rgba(0,0,0,.2), transparent, rgba(255,255,255,.2)),
        linear-gradient(to top, transparent 10%, #14757a, #39c6d6);
      box-shadow: inset 0 0 2px rgba(0,0,0,.5);
      animation: grow-flower-tree 4s backwards;
    }

    /* ---- Stem leaves ---- */
    .flower__line__leaf {
      --w: 7vmin;
      --h: calc(var(--w) + 2vmin);
      position: absolute;
      top: 20%; left: 90%;
      width: var(--w); height: var(--h);
      border-top-right-radius: var(--h);
      border-bottom-left-radius: var(--h);
      background-image: linear-gradient(to top, rgba(20,117,122,.4), #39c6d6);
    }
    .flower__line__leaf--1 { transform: rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--2 { top: 45%; transform: rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--3,
    .flower__line__leaf--4,
    .flower__line__leaf--6 {
      border-top-right-radius: 0;
      border-bottom-left-radius: 0;
      border-top-left-radius: var(--h);
      border-bottom-right-radius: var(--h);
      left: -460%;
      top: 12%;
      transform: rotate(-70deg) rotateY(30deg);
    }
    .flower__line__leaf--4 { top: 40%; }
    .flower__line__leaf--5 { top: 0; transform-origin: left; transform: rotate(70deg) rotateY(30deg) scale(0.6); }
    .flower__line__leaf--6 { top: -2%; left: -450%; transform-origin: right; transform: rotate(-70deg) rotateY(30deg) scale(0.6); }

    /* ---- Lights (fireflies) ---- */
    .flower__light {
      position: absolute;
      bottom: 0;
      width: 1vmin; height: 1vmin;
      background-color: rgb(255,251,0);
      border-radius: 50%;
      filter: blur(0.2vmin);
      animation: light-ans 4s linear infinite backwards;
    }
    .flower__light:nth-child(odd) { background-color: #23f0ff; }
    .flower__light--1 { left: -2vmin; animation-delay: 1.0s; }
    .flower__light--2 { left:  3vmin; animation-delay: 0.5s; }
    .flower__light--3 { left: -6vmin; animation-delay: 0.3s; }
    .flower__light--4 { left:  6vmin; animation-delay: 0.9s; }
    .flower__light--5 { left: -1vmin; animation-delay: 1.5s; }
    .flower__light--6 { left: -4vmin; animation-delay: 3.0s; }
    .flower__light--7 { left:  3vmin; animation-delay: 2.0s; }
    .flower__light--8 { left: -6vmin; animation-delay: 3.5s; }

    /* ---- Grass ---- */
    .flower__grass {
      --c: #159faa;
      --line-w: 1.5vmin;
      position: absolute;
      bottom: 12vmin; left: -7vmin;
      display: flex; flex-direction: column; align-items: flex-end;
      z-index: 20;
      transform-origin: bottom center;
      transform: rotate(-48deg) rotateY(40deg);
    }
    .flower__grass--1 { animation: moving-grass 2s linear infinite; }
    .flower__grass--2 {
      left: 2vmin; bottom: 10vmin;
      transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);
      opacity: 0.8; z-index: 0;
      animation: moving-grass--2 1.5s linear infinite;
    }
    .flower__grass--top {
      width: 7vmin; height: 10vmin;
      border-top-right-radius: 100%;
      border-right: var(--line-w) solid var(--c);
      transform-origin: bottom center;
      transform: rotate(-2deg);
    }
    .flower__grass--bottom {
      margin-top: -2px;
      width: var(--line-w); height: 25vmin;
      background-image: linear-gradient(to top, transparent, var(--c));
    }
    .flower__grass__leaf {
      --size: 10vmin;
      position: absolute;
      width: calc(var(--size) * 2.1); height: var(--size);
      border-top-left-radius: var(--size);
      border-top-right-radius: var(--size);
      background-image: linear-gradient(to top, transparent, transparent 30%, var(--c));
      z-index: 100;
    }
    .flower__grass__leaf--1 { top:-6%;  left:30%;   --size:6vmin;  transform:rotate(-20deg); animation: growing-grass-ans--1 2s 2.6s backwards; }
    .flower__grass__leaf--2 { top:-5%;  left:-110%; --size:6vmin;  transform:rotate(10deg);  animation: growing-grass-ans--2 2s 2.4s linear backwards; }
    .flower__grass__leaf--3 { top:5%;   left:60%;   --size:8vmin;  transform:rotate(-18deg) rotateX(-20deg); animation: growing-grass-ans--3 2s 2.2s linear backwards; }
    .flower__grass__leaf--4 { top:6%;   left:-135%; --size:8vmin;  transform:rotate(2deg);   animation: growing-grass-ans--4 2s 2.0s linear backwards; }
    .flower__grass__leaf--5 { top:20%;  left:60%;   --size:10vmin; transform:rotate(-24deg) rotateX(-20deg); animation: growing-grass-ans--5 2s 1.8s linear backwards; }
    .flower__grass__leaf--6 { top:22%;  left:-180%; --size:10vmin; transform:rotate(10deg);  animation: growing-grass-ans--6 2s 1.6s linear backwards; }
    .flower__grass__leaf--7 { top:39%;  left:70%;   --size:10vmin; transform:rotate(-10deg); animation: growing-grass-ans--7 2s 1.4s linear backwards; }
    .flower__grass__leaf--8 { top:40%;  left:-215%; --size:11vmin; transform:rotate(10deg);  animation: growing-grass-ans--8 2s 1.2s linear backwards; }
    .flower__grass__overlay {
      position: absolute; top:-10%; right:0;
      width:100%; height:100%;
      background-color: rgba(0,0,0,0.6);
      filter: blur(1.5vmin); z-index:100;
    }

    /* ---- G-Long ---- */
    .flower__g-long {
      --w:2vmin; --h:6vmin; --c:#159faa;
      position: absolute; bottom:10vmin; left:-3vmin;
      transform-origin: bottom center;
      transform: rotate(-30deg) rotateY(-20deg);
      display: flex; flex-direction: column; align-items: flex-end;
      animation: flower-g-long-ans 3s linear infinite;
    }
    .flower__g-long__top {
      top: calc(var(--h)*-1);
      width: calc(var(--w)+1vmin); height: var(--h);
      border-top-right-radius: 100%;
      border-right: 0.7vmin solid var(--c);
      transform: translate(-0.7vmin, 1vmin);
    }
    .flower__g-long__bottom {
      width: var(--w); height: 50vmin;
      transform-origin: bottom center;
      background-image: linear-gradient(to top, transparent 30%, var(--c));
      box-shadow: inset 0 0 2px rgba(0,0,0,.5);
      clip-path: polygon(35% 0, 65% 1%, 100% 100%, 0% 100%);
    }

    /* ---- G-Right ---- */
    .flower__g-right {
      position: absolute; bottom:6vmin; left:-2vmin;
      transform-origin: bottom left;
      transform: rotate(20deg);
    }
    .flower__g-right .leaf {
      width:30vmin; height:50vmin;
      border-top-left-radius: 100%;
      border-left: 2vmin solid #079097;
      background-image: linear-gradient(to bottom, transparent, var(--dark-color) 60%);
      -webkit-mask-image: linear-gradient(to top, transparent 30%, #079097 60%);
              mask-image: linear-gradient(to top, transparent 30%, #079097 60%);
    }
    .flower__g-right--1 { animation: flower-g-right-ans 2.5s linear infinite; }
    .flower__g-right--2 {
      left:5vmin; transform: rotateY(-180deg);
      animation: flower-g-right-ans--2 3s linear infinite;
    }
    .flower__g-right--2 .leaf { height:75vmin; filter:blur(0.3vmin); opacity:0.8; }

    /* ---- G-Front ---- */
    .flower__g-front {
      position: absolute; bottom:6vmin; left:2.5vmin; z-index:100;
      transform-origin: bottom center;
      transform: rotate(-28deg) rotateY(30deg) scale(1.04);
      animation: flower__g-front-ans 2s linear infinite;
    }
    .flower__g-front__line {
      width:0.3vmin; height:20vmin;
      background-image: linear-gradient(to top, transparent, #079097, transparent 100%);
      position: relative;
    }
    .flower__g-front__leaf-wrapper {
      position: absolute; top:0; left:0;
      transform-origin: bottom left;
      transform: rotate(10deg);
    }
    .flower__g-front__leaf-wrapper:nth-child(even) {
      left:0; transform: rotateY(-180deg) rotate(5deg);
      animation: flower__g-front__leaf-left-ans 1s ease-in backwards;
    }
    .flower__g-front__leaf-wrapper:nth-child(odd) {
      animation: flower__g-front__leaf-ans 1s ease-in backwards;
    }
    .flower__g-front__leaf-wrapper--1 { top:-8vmin; transform:scale(0.7); animation: flower__g-front__leaf-ans 1s 5.5s ease-in backwards !important; }
    .flower__g-front__leaf-wrapper--2 { top:-8vmin; transform:rotateY(-180deg) scale(0.7) !important; animation: flower__g-front__leaf-left-ans-2 1s 4.6s ease-in backwards !important; }
    .flower__g-front__leaf-wrapper--3 { top:-3vmin; animation: flower__g-front__leaf-ans 1s 4.6s ease-in backwards; }
    .flower__g-front__leaf-wrapper--4 { top:-3vmin; transform:rotateY(-180deg) scale(0.9) !important; animation: flower__g-front__leaf-left-ans-2 1s 4.6s ease-in backwards !important; }
    .flower__g-front__leaf-wrapper--5, .flower__g-front__leaf-wrapper--6 { top:2vmin; }
    .flower__g-front__leaf-wrapper--7, .flower__g-front__leaf-wrapper--8 { top:6.5vmin; }
    .flower__g-front__leaf-wrapper--2 { animation-delay:5.2s !important; }
    .flower__g-front__leaf-wrapper--3 { animation-delay:4.9s !important; }
    .flower__g-front__leaf-wrapper--5 { animation-delay:4.3s !important; }
    .flower__g-front__leaf-wrapper--6 { animation-delay:4.1s !important; }
    .flower__g-front__leaf-wrapper--7 { animation-delay:3.8s !important; }
    .flower__g-front__leaf-wrapper--8 { animation-delay:3.5s !important; }
    .flower__g-front__leaf {
      width:10vmin; height:10vmin;
      border-radius: 100% 0% 0% 100% / 100% 100% 0% 0%;
      box-shadow: inset 0 2px 1vmin hsla(184,97%,58%,0.2);
      background-image:
        linear-gradient(to bottom left, transparent, var(--dark-color)),
        linear-gradient(to bottom right, #159faa 50%, transparent 50%);
      -webkit-mask-image: linear-gradient(to bottom right, #159faa 50%, transparent 50%);
              mask-image: linear-gradient(to bottom right, #159faa 50%, transparent 50%);
    }

    /* ---- G-FR ---- */
    .flower__g-fr {
      position: absolute; bottom:-4vmin; left:0;
      transform-origin: bottom left; z-index:10;
      animation: flower__g-fr-ans 2s linear infinite;
    }
    .flower__g-fr .leaf {
      width:30vmin; height:50vmin;
      border-top-left-radius: 100%;
      border-left: 2vmin solid #079097;
      -webkit-mask-image: linear-gradient(to top, transparent 25%, #079097 50%);
              mask-image: linear-gradient(to top, transparent 25%, #079097 50%);
      position: relative; z-index:1;
    }
    .flower__g-fr__leaf {
      position: absolute; top:0; left:0;
      width:10vmin; height:10vmin;
      border-radius: 100% 0% 0% 100% / 100% 100% 0% 0%;
      box-shadow: inset 0 2px 1vmin hsla(184,97%,58%,0.2);
      background-image:
        linear-gradient(to bottom left, transparent, var(--dark-color) 98%),
        linear-gradient(to bottom right, #23f0ff 45%, transparent 50%);
      -webkit-mask-image: linear-gradient(135deg, #159faa 40%, transparent 50%);

      <div class="grow-ans" style="--d:4.4s"><div class="leaf leaf--1"></div></div>
      <div class="grow-ans" style="--d:4.6s"><div class="leaf leaf--2"></div></div>
      <div class="grow-ans" style="--d:4.8s"><div class="leaf leaf--3"></div></div>
    </div>
    <div class="long-g long-g--7">
      <div class="grow-ans" style="--d:3s"><div class="leaf leaf--0"></div></div>
      <div class="grow-ans" style="--d:3.2s"><div class="leaf leaf--1"></div></div>
      <div class="grow-ans" style="--d:3.5s"><div class="leaf leaf--2"></div></div>
      <div class="grow-ans" style="--d:3.6s"><div class="leaf leaf--3"></div></div>
    </div>
  </div><!-- /flowers -->

  <!-- ============================================================
       SCRIPTS
  ============================================================ -->
  <script>
    /* ============================================================
       1. STAR FIELD GENERATOR
    ============================================================ */
    (function generateStars() {
      const container = document.getElementById('stars');
      const count = 120;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        star.style.cssText = `
          width:${size}px; height:${size}px;
          top:${Math.random()*100}%;
          left:${Math.random()*100}%;
          --dur:${2 + Math.random()*4}s;
          --delay:${Math.random()*5}s;
        `;
        container.appendChild(star);
      }
    })();

    /* ============================================================
       2. TYPING EFFECT
    ============================================================ */
    const MESSAGES = [
      'Sorry if this is a bit embarrassing, but I just wanted to say Im so glad you got to see this febby ',
      'Maybe for you this is just a flower, but for me this is a symbol of how precious you are to me (NGL).',
      'To the world, you may be one person, but to me, you are the whole world.',
      'Flowers bloom for the sun, but my heart blooms only for your smile.',
      'Terima kasih sudah hadir dan membuat malamku lebih indah. 💫',
      'Setiap cahaya kecil di sini mewakili satu hal yang aku kagumi tentang kamu. ✨',
    ];
    let msgIndex = 0;
    let charIndex = 0;
    let isDeleting = false;
    const typingEl = document.getElementById('typingText');
    const cursorEl = document.getElementById('typingCursor');

    function type() {
      const current = MESSAGES[msgIndex];
      if (!isDeleting) {
        typingEl.textContent = current.slice(0, ++charIndex);
        if (charIndex === current.length) {
          isDeleting = true;
          setTimeout(type, 2800);
          return;
        }
      } else {
        typingEl.textContent = current.slice(0, --charIndex);
        if (charIndex === 0) {
          isDeleting = false;
          msgIndex = (msgIndex + 1) % MESSAGES.length;
        }
      }
      setTimeout(type, isDeleting ? 35 : 58);
    }
    // Start after scene loads
    setTimeout(type, 1200);

    /* ============================================================
       3. HEART COUNTER
    ============================================================ */
    let heartCount = 0;
    function updateCounter() {
      document.getElementById('heartCounter').textContent =
        `${heartCount} Jumlah klik yang kamu kirim malam ini`;
    }

    /* ============================================================
       4. TOGGLE PANEL
    ============================================================ */
    let panelVisible = true;
    function togglePanel() {
      const panel = document.getElementById('glassPanel');
      const btn   = document.getElementById('toggleBtn');
      panelVisible = !panelVisible;
      panel.classList.toggle('hidden', !panelVisible);
      btn.textContent = panelVisible ? 'Sembunyikan Panel' : 'Tampilkan Panel';
      // move button outside when hidden
      if (!panelVisible) {
        btn.style.cssText = `
          position:fixed; bottom:24px; left:50%;
          transform:translateX(-50%); z-index:600;
        `;
        document.body.appendChild(btn);
      } else {
        btn.style.cssText = '';
        document.getElementById('glassPanel').appendChild(btn);
      }
    }

    /* ============================================================
       6. MOUSE PARALLAX — subtle panel tilt
    ============================================================ */
    const panel = document.getElementById('glassPanel');
    document.addEventListener('mousemove', (e) => {
      if (!panelVisible) return;
      const rx = ((e.clientY / window.innerHeight) - 0.5) * 8;
      const ry = ((e.clientX / window.innerWidth)  - 0.5) * -8;
      panel.style.transform = `
        translate(-50%, calc(-50% - ${Math.sin(Date.now()/1500)*8}px))
        rotateX(${rx}deg) rotateY(${ry}deg)
      `;
    });
  </script>
</body>
